services:

  # ===========================================================================
  # UPTIME KUMA - Service heartbeat monitoring
  # http://${SERVER_IP}:${UPTIME_KUMA_PORT}
  #
  # Add a monitor for every service. Home Assistant reads Kuma's status
  # via the Uptime Kuma integration, so this is the single source of
  # truth for "is X up?" — HA surfaces it on the family dashboard.
  # ===========================================================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - ${CONFIG_PATH}/uptime-kuma:/app/data
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@uptime: "host uptime.${DOMAIN}"
      caddy.handle: "@uptime"
      caddy.handle.reverse_proxy: "{{upstreams 3001}}"
    networks:
      - home

  # ===========================================================================
  # DOZZLE - Real-time container log viewer
  # http://${SERVER_IP}:${DOZZLE_PORT}
  # Debugging tool — open it only when something is already known broken.
  # Docker socket is read-only; Dozzle does not need write access.
  # ===========================================================================
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@logs: "host logs.${DOMAIN}"
      caddy.handle: "@logs"
      caddy.handle.reverse_proxy: "{{upstreams 8080}}"
    networks:
      - home

  # ===========================================================================
  # DIUN - Docker Image Update Notifier
  # http://${SERVER_IP}:${DIUN_PORT}  (metrics / healthcheck endpoint)
  #
  # NOTIFIES when image updates exist. Does NOT apply them — by design.
  # Pair with Arcane for a one-click "pull + recreate" workflow.
  #
  # Notifications go to Home Assistant via webhook so all alerts land
  # in one notification stream. Set DIUN_NOTIF_WEBHOOK_URL in .env to:
  #   http://<ha-vm-ip>:8123/api/webhook/<your-webhook-id>
  # Create the webhook in HA: Settings → Automations → New → Webhook trigger.
  # ===========================================================================
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - ${CONFIG_PATH}/diun:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=0 0 6 * * *           # daily at 06:00 local
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true                # auto-discover every running container
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true # opt-out via label, not opt-in
      # ---- Notifications -> ntfy (same stack) ----
      # Image-update alerts get pushed to ntfy. Subscribe to the "diun-updates"
      # topic in the ntfy app to get them on your phone — no need to check
      # manually. ntfy lives in this stack, reachable at http://ntfy.
      - DIUN_NOTIF_NTFY_ENDPOINT=http://ntfy
      - DIUN_NOTIF_NTFY_TOPIC=diun-updates
      - DIUN_NOTIF_NTFY_PRIORITY=3                # ntfy priority is an INT 1-5 (3 = default)
    networks:
      - home

  # ===========================================================================
  # NTFY - Self-hosted push notifications hub
  # http://${SERVER_IP}:${NTFY_PORT}
  #
  # One endpoint everything can POST to -> a push on your phone. Wire it into
  # Proxmox notifications, cron jobs, backup scripts, the *arr stack, etc.
  #   curl -d "Backup done" http://${SERVER_IP}:${NTFY_PORT}/home
  # Install the ntfy app and subscribe to your topics.
  #
  # Open by default for LAN use. To require accounts, set:
  #   NTFY_AUTH_DEFAULT_ACCESS=deny-all   then create users with `ntfy user add`.
  # ===========================================================================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    environment:
      - TZ=${TZ}
      - NTFY_BASE_URL=http://${SERVER_IP}:${NTFY_PORT}
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ${CONFIG_PATH}/ntfy/cache:/var/cache/ntfy
      - ${CONFIG_PATH}/ntfy/lib:/var/lib/ntfy
      - ${CONFIG_PATH}/ntfy/etc:/etc/ntfy
    ports:
      - "${NTFY_PORT}:80"
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@ntfy: "host ntfy.${DOMAIN}"
      caddy.handle: "@ntfy"
      caddy.handle.reverse_proxy: "{{upstreams 80}}"
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # BESZEL - lightweight host + container metrics (CPU/RAM/disk/network/temps,
  # with history). OPT-IN: COMPOSE_PROFILES=metrics. The low-overhead answer to
  # "how's the box doing?" without a full Prometheus/Grafana stack.
  #   hub   = web UI (this is what you open)
  #   agent = collects metrics from THIS host (host network + docker socket)
  # First run: open the hub, "Add System", copy the shown public key into
  # BESZEL_KEY in .env, redeploy. Point the system at host.docker.internal:45876.
  # ===========================================================================
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    profiles: ["metrics"]
    ports:
      - "${BESZEL_PORT:-8090}:8090"
    volumes:
      - ${CONFIG_PATH}/beszel/data:/beszel_data
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the hub can reach the host-networked agent
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@beszel: "host beszel.${DOMAIN}"
      caddy.handle: "@beszel"
      caddy.handle.reverse_proxy: "{{upstreams 8090}}"
    networks:
      - home

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    profiles: ["metrics"]
    # host network so it sees real host CPU/net/disk; docker.sock for container stats.
    network_mode: host
    environment:
      - PORT=45876
      - KEY=${BESZEL_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_PATH}/beszel/agent:/var/lib/beszel-agent

networks:
  home:
    external: true

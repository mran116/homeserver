services:

  # ===========================================================================
  # UPTIME KUMA - Service heartbeat monitoring
  # http://${SERVER_IP}:${UPTIME_KUMA_PORT}
  #
  # Add a monitor for every service. Home Assistant reads Kuma's status
  # via the Uptime Kuma integration, so this is the single source of
  # truth for "is X up?" — HA surfaces it on the family dashboard.
  # ===========================================================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - ${CONFIG_PATH}/uptime-kuma:/app/data
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@uptime: "host uptime.${DOMAIN}"
      caddy.handle: "@uptime"
      caddy.handle.reverse_proxy: "{{upstreams 3001}}"
    networks:
      - home

  # ===========================================================================
  # DOZZLE - Real-time container log viewer
  # http://${SERVER_IP}:${DOZZLE_PORT}
  # Debugging tool — open it only when something is already known broken.
  # Docker socket is read-only; Dozzle does not need write access.
  # ===========================================================================
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@logs: "host logs.${DOMAIN}"
      caddy.handle: "@logs"
      caddy.handle.reverse_proxy: "{{upstreams 8080}}"
    networks:
      - home

  # ===========================================================================
  # DIUN - Docker Image Update Notifier
  # http://${SERVER_IP}:${DIUN_PORT}  (metrics / healthcheck endpoint)
  #
  # NOTIFIES when image updates exist. Does NOT apply them — by design.
  # Pair with Arcane for a one-click "pull + recreate" workflow.
  #
  # Notifications go to Home Assistant via webhook so all alerts land
  # in one notification stream. Set DIUN_NOTIF_WEBHOOK_URL in .env to:
  #   http://<ha-vm-ip>:8123/api/webhook/<your-webhook-id>
  # Create the webhook in HA: Settings → Automations → New → Webhook trigger.
  # ===========================================================================
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - ${CONFIG_PATH}/diun:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=0 0 6 * * *           # daily at 06:00 local
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true                # auto-discover every running container
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true # opt-out via label, not opt-in
      # ---- Notifications -> ntfy (same stack) ----
      # Image-update alerts get pushed to ntfy. Subscribe to the "diun-updates"
      # topic in the ntfy app to get them on your phone — no need to check
      # manually. ntfy lives in this stack, reachable at http://ntfy.
      - DIUN_NOTIF_NTFY_ENDPOINT=http://ntfy
      - DIUN_NOTIF_NTFY_TOPIC=diun-updates
      - DIUN_NOTIF_NTFY_PRIORITY=3                # ntfy priority is an INT 1-5 (3 = default)
    networks:
      - home

  # ===========================================================================
  # NTFY - Self-hosted push notifications hub
  # http://${SERVER_IP}:${NTFY_PORT}
  #
  # One endpoint everything can POST to -> a push on your phone. Wire it into
  # Proxmox notifications, cron jobs, backup scripts, the *arr stack, etc.
  #   curl -d "Backup done" http://${SERVER_IP}:${NTFY_PORT}/home
  # Install the ntfy app and subscribe to your topics.
  #
  # Open by default for LAN use. To require accounts, set:
  #   NTFY_AUTH_DEFAULT_ACCESS=deny-all   then create users with `ntfy user add`.
  # ===========================================================================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    environment:
      - TZ=${TZ}
      - NTFY_BASE_URL=http://${SERVER_IP}:${NTFY_PORT}
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ${CONFIG_PATH}/ntfy/cache:/var/cache/ntfy
      - ${CONFIG_PATH}/ntfy/lib:/var/lib/ntfy
      - ${CONFIG_PATH}/ntfy/etc:/etc/ntfy
    ports:
      - "${NTFY_PORT}:80"
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@ntfy: "host ntfy.${DOMAIN}"
      caddy.handle: "@ntfy"
      caddy.handle.reverse_proxy: "{{upstreams 80}}"
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # NETDATA - all-in-one host + container metrics with 350+ alerts BUILT IN.
  # OPT-IN: COMPOSE_PROFILES=metrics. One container, zero config: auto-detects
  # every container BY NAME (via the Docker API, so it's immune to the cAdvisor/
  # containerd-snapshotter naming problem), keeps recent history to dig through
  # after a crash, and alerts out of the box on disk-fill / RAM / OOM-kills /
  # container health -> ntfy. Collects every 5s (netdata/netdata.conf) to stay
  # light. Open netdata.${DOMAIN}. Alerts route via netdata/health_alarm_notify.conf.
  # ===========================================================================
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: ${NETDATA_HOSTNAME:-homeserver}
    restart: unless-stopped
    profiles: ["metrics"]
    pid: host                          # see real host processes
    cap_add:
      - SYS_PTRACE                     # per-process metrics (apps.plugin)
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    environment:
      - DO_NOT_TRACK=1                 # no anonymous telemetry; runs fully local
    ports:
      - "${NETDATA_PORT:-19999}:19999"
    volumes:
      - netdata-lib:/var/lib/netdata           # history (dbengine) + state
      - netdata-cache:/var/cache/netdata
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # container names + stats
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@netdata: "host netdata.${DOMAIN}"
      caddy.handle: "@netdata"
      caddy.handle.reverse_proxy: "{{upstreams 19999}}"
    networks:
      - home

  # ===========================================================================
  # CENTRALIZED LOGGING (opt-in: COMPOSE_PROFILES=logging)
  # Loki stores logs, Grafana searches + dashboards them, Alloy collects them.
  # One searchable home for ALL logs — every container + the host's OS journal
  # (kernel/OOM/failed-units/SATA drops). Dozzle stays for quick live-tail; this
  # adds retention + full-text search across everything.
  # Grafana login: admin / ${GRAFANA_ADMIN_PASSWORD} (gen-secrets fills it).
  # ===========================================================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    profiles: ["logging"]
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - home

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: ["logging"]
    depends_on:
      - loki
    environment:
      # Reuse your shared app login (same as qBittorrent/SABnzbd) so it's ONE
      # credential. Falls back to admin/admin only if APP_* are unset. Applied
      # on first init only — change later in the Grafana UI.
      - GF_SECURITY_ADMIN_USER=${APP_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${APP_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - ${GRAFANA_PORT:-3006}:3000
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@grafana: "host grafana.${DOMAIN}"
      caddy.handle: "@grafana"
      caddy.handle.reverse_proxy: "{{upstreams 3000}}"
    networks:
      - home

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    profiles: ["logging"]
    depends_on:
      - loki
    # root + docker.sock + journal so it reads BOTH container logs and host journal.
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    networks:
      - home

networks:
  home:
    external: true

volumes:
  loki-data:
  grafana-data:
  netdata-lib:
  netdata-cache:

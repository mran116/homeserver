services:

  # ===========================================================================
  # UPTIME KUMA - Service heartbeat monitoring
  # http://${SERVER_IP}:${UPTIME_KUMA_PORT}
  #
  # Add a monitor for every service. Home Assistant reads Kuma's status
  # via the Uptime Kuma integration, so this is the single source of
  # truth for "is X up?" — HA surfaces it on the family dashboard.
  # ===========================================================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - ${CONFIG_PATH}/uptime-kuma:/app/data
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@uptime: "host uptime.${DOMAIN}"
      caddy.handle: "@uptime"
      caddy.handle.reverse_proxy: "{{upstreams 3001}}"
    networks:
      - home

  # ===========================================================================
  # DOZZLE - Real-time container log viewer
  # http://${SERVER_IP}:${DOZZLE_PORT}
  # Debugging tool — open it only when something is already known broken.
  # Docker socket is read-only; Dozzle does not need write access.
  # ===========================================================================
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@logs: "host logs.${DOMAIN}"
      caddy.handle: "@logs"
      caddy.handle.reverse_proxy: "{{upstreams 8080}}"
    networks:
      - home

  # ===========================================================================
  # DIUN - Docker Image Update Notifier
  # http://${SERVER_IP}:${DIUN_PORT}  (metrics / healthcheck endpoint)
  #
  # NOTIFIES when image updates exist. Does NOT apply them — by design.
  # Pair with Arcane for a one-click "pull + recreate" workflow.
  #
  # Notifications go to ntfy (same stack) on the "diun-updates" topic — see the
  # DIUN_NOTIF_NTFY_* env below. Subscribe to that topic in the ntfy app to get
  # image-update alerts on your phone.
  # ===========================================================================
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - ${CONFIG_PATH}/diun:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=0 0 6 * * *           # daily at 06:00 local
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true                # auto-discover every running container
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true # opt-out via label, not opt-in
      # ---- Notifications -> ntfy (same stack) ----
      # Image-update alerts get pushed to ntfy. Subscribe to the "diun-updates"
      # topic in the ntfy app to get them on your phone — no need to check
      # manually. ntfy lives in this stack, reachable at http://ntfy.
      - DIUN_NOTIF_NTFY_ENDPOINT=http://ntfy
      - DIUN_NOTIF_NTFY_TOPIC=diun-updates
      - DIUN_NOTIF_NTFY_PRIORITY=3                # ntfy priority is an INT 1-5 (3 = default)
    networks:
      - home

  # ===========================================================================
  # NTFY - Self-hosted push notifications hub
  # http://${SERVER_IP}:${NTFY_PORT}
  #
  # One endpoint everything can POST to -> a push on your phone. Wire it into
  # Proxmox notifications, cron jobs, backup scripts, the *arr stack, etc.
  #   curl -d "Backup done" http://${SERVER_IP}:${NTFY_PORT}/home
  # Install the ntfy app and subscribe to your topics.
  #
  # Open by default for LAN use. To require accounts, set:
  #   NTFY_AUTH_DEFAULT_ACCESS=deny-all   then create users with `ntfy user add`.
  # ===========================================================================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    environment:
      - TZ=${TZ}
      - NTFY_BASE_URL=https://ntfy.${DOMAIN}
      # iOS background push: Apple forbids long-lived connections, so a self-hosted
      # server forwards a wake-up "poke" through ntfy.sh's APNs. Only a HASHED topic
      # goes upstream — the actual message + content stay on your server (the phone
      # fetches them from NTFY_BASE_URL, reachable over Tailscale when away).
      - NTFY_UPSTREAM_BASE_URL=https://ntfy.sh
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ${CONFIG_PATH}/ntfy/cache:/var/cache/ntfy
      - ${CONFIG_PATH}/ntfy/lib:/var/lib/ntfy
      - ${CONFIG_PATH}/ntfy/etc:/etc/ntfy
    ports:
      - "${NTFY_PORT}:80"
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@ntfy: "host ntfy.${DOMAIN}"
      caddy.handle: "@ntfy"
      caddy.handle.reverse_proxy: "{{upstreams 80}}"
      # ntfy uses long-lived streaming connections; without immediate flushing
      # Caddy buffers them and app subscriptions time out. -1 = flush instantly.
      caddy.handle.reverse_proxy.flush_interval: "-1"
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # PULSE - unified metrics + alerts for Proxmox AND Docker.
  # OPT-IN: COMPOSE_PROFILES=metrics. One light container. It monitors TWO layers,
  # no cloud account and no node cap:
  #   - Proxmox/PBS (nodes, VMs, LXCs, storage, backups) — agentless, polls the
  #     Proxmox API. Add hosts in the UI (Settings -> Nodes) with a read-only token.
  #   - Docker (per-container CPU/RAM/net + temps, with history) — via a lightweight
  #     "unified agent" you install ON each Docker HOST (not a container). Grab the
  #     one-line install command from the UI (Settings -> Agents); it bakes in an
  #     API token. The SERVER does NOT need the docker socket — the agent pushes in.
  # Alerts (node down, container OOM/misbehaving, backup failed, storage full) route
  # out via a webhook channel -> ntfy (Settings -> Alerts/Notifications: webhook to
  # http://ntfy/<topic>). Open pulse.${DOMAIN}. Login reuses APP_USERNAME/APP_PASSWORD.
  # Live + historical container LOGS are Dozzle + lnav (Pulse does metrics, not logs).
  # ===========================================================================
  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: unless-stopped
    profiles: ["metrics"]
    environment:
      - TZ=${TZ}
      # Reuse your shared app login (same as qBittorrent/Grafana). Auto-hashed on
      # first start. Falls back to admin/admin only if APP_* are unset.
      - PULSE_AUTH_USER=${APP_USERNAME:-admin}
      - PULSE_AUTH_PASS=${APP_PASSWORD:-admin}
    ports:
      - "${PULSE_PORT:-7655}:7655"
    volumes:
      - pulse-data:/data            # config, node/agent tokens, metric history
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@pulse: "host pulse.${DOMAIN}"
      caddy.handle: "@pulse"
      caddy.handle.reverse_proxy: "{{upstreams 7655}}"
    networks:
      - home

  # ===========================================================================
  # VECTOR - light central log retention (opt-in: COMPOSE_PROFILES=logs).
  # One tiny Rust shipper. Tails EVERY container via the Docker API and writes one
  # ndjson file per container per day to ${CONFIG_PATH}/logs (a host bind mount),
  # which `lnav` reads on the host: `sudo lnav ${CONFIG_PATH}/logs` — merged,
  # time-ordered, searchable, with container_name as a column (install the format
  # once: `lnav -i monitoring/vector/lnav-docker.json`). No transforms = no VRL to
  # maintain; the config is ~10 lines (monitoring/vector/vector.toml). This is the
  # FEATHERWEIGHT central-log option. For indexed full-text search + dashboards,
  # the heavier `logging` profile (Loki + Grafana + Alloy) is the upgrade instead.
  # Vector has no UI — Dozzle is your live-tail, lnav is your history browser.
  # ===========================================================================
  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    restart: unless-stopped
    profiles: ["logs"]
    environment:
      - TZ=${TZ}
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read-only: discover + tail
      - ${CONFIG_PATH}/logs:/logs                       # host dir lnav reads
      - vector-data:/vector-data                        # vector's own state/buffers
    networks:
      - home

  # ===========================================================================
  # CENTRALIZED LOGGING (opt-in: COMPOSE_PROFILES=logging)
  # Loki stores logs, Grafana searches + dashboards them, Alloy collects them.
  # One searchable home for ALL logs — every container + the host's OS journal
  # (kernel/OOM/failed-units/SATA drops). Dozzle stays for quick live-tail; this
  # adds retention + full-text search across everything.
  # Grafana login: reuses your shared APP_USERNAME / APP_PASSWORD (first init only).
  #
  # NOTE: this is the HEAVY central-log option (~3 containers). For a featherweight
  # alternative, the `logs` profile (Vector -> ndjson files + lnav) is above.
  # ===========================================================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    profiles: ["logging"]
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - home

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: ["logging"]
    depends_on:
      - loki
    environment:
      # Reuse your shared app login (same as qBittorrent/SABnzbd) so it's ONE
      # credential. Falls back to admin/admin only if APP_* are unset. Applied
      # on first init only — change later in the Grafana UI.
      - GF_SECURITY_ADMIN_USER=${APP_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${APP_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - ${GRAFANA_PORT:-3006}:3000
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@grafana: "host grafana.${DOMAIN}"
      caddy.handle: "@grafana"
      caddy.handle.reverse_proxy: "{{upstreams 3000}}"
    networks:
      - home

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    profiles: ["logging"]
    depends_on:
      - loki
    # root + docker.sock + journal so it reads BOTH container logs and host journal.
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    networks:
      - home

networks:
  home:
    external: true

volumes:
  loki-data:
  grafana-data:
  pulse-data:
  vector-data:

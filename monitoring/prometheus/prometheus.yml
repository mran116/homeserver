# Prometheus — scrapes host + container metrics for Grafana. Local + private.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node            # host: CPU / RAM / disk / net / temps
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor        # per-container CPU / mem / net / io
    static_configs:
      - targets: ['cadvisor:8080']

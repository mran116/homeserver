#!/usr/bin/env bash
# Netdata alert routing — USER override layer. alarm-notify.sh loads its stock
# defaults first, then this file, so we only flip on what we use.

# --- ntfy (self-hosted, same stack) -> your phone -------------------------
# Reuses the shared "diun-updates" topic the rest of the stack already pushes
# to (mount-watchdog, sab-watchdog, Diun), so every alert lands in one place.
SEND_NTFY="YES"
DEFAULT_RECIPIENT_NTFY="http://ntfy/diun-updates"

# --- silence channels we don't use (keeps the notify log clean) -----------
SEND_EMAIL="NO"
SEND_SLACK="NO"
SEND_DISCORD="NO"
SEND_TELEGRAM="NO"
SEND_PD="NO"
SEND_TWILIO="NO"


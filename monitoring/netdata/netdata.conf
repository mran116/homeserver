# Netdata — lean local overrides. Anything not set here uses Netdata's stock
# defaults (from /usr/lib/netdata/conf.d). This file is the USER override layer.
[global]
    # Collect every 5s instead of per-second: much lighter CPU, and plenty of
    # resolution for alerting + after-the-fact digging on a home server.
    update every = 5

[ml]
    # Anomaly-detection ML off — we want the 350+ threshold alerts, not the
    # extra CPU/RAM of machine-learning scoring.
    enabled = no

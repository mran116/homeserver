# Grafana alert delivery -> ntfy (same stack, http://ntfy). Reuses the shared
# "diun-updates" topic the rest of the stack already pushes to, so every alert —
# image updates, mount drops, AND Grafana metric/log alerts — lands in one place.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: ntfy
    receivers:
      - uid: ntfy_webhook
        type: webhook
        settings:
          url: http://ntfy/diun-updates
          httpMethod: POST

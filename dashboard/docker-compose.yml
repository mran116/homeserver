services:

  # ===========================================================================
  # HOMEPAGE - Central dashboard and service launcher
  # http://${SERVER_IP}:${HOMEPAGE_PORT}
  #
  # Config is the SINGLE SOURCE OF TRUTH in ./homepage/ in this repo. You never
  # copy it by hand: scripts/make-dirs.sh (run by bootstrap AND every
  # scripts/update.sh) mirrors ./homepage/*.yaml into ${CONFIG_PATH}/homepage/,
  # and Homepage hot-reloads. So: edit a file here, run update.sh, done.
  #   - Fill in API keys / logins in .env (or ./scripts/harvest-keys.sh)
  #   - Add your coordinates in widgets.yaml for weather
  #   - Update domain URLs in bookmarks.yaml when domain is ready
  #
  # All port/IP/secret vars are forwarded from the root .env as HOMEPAGE_VAR_*
  # below — services.yaml references them via {{HOMEPAGE_VAR_*}} so .env stays
  # the single source of truth. Live up/down dots + CPU/RAM come from the Docker
  # API via the `dockerproxy` service below (see homepage/docker.yaml) — Homepage
  # stays non-root and never touches the raw socket.
  # ===========================================================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    depends_on:
      - dockerproxy
    ports:
      - "${HOMEPAGE_PORT}:3000"
    volumes:
      - ${CONFIG_PATH}/homepage:/app/config
      # Read-only host paths for the resources widget (system-stats header):
      # disk usage of the local SSD + the media library, and CPU temperature.
      - ${CONFIG_PATH}:/mnt/host/local:ro
      - ${MEDIA_PATH}:/mnt/host/media:ro
      - /sys/class/thermal:/sys/class/thermal:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      # Defaults to SERVER_IP:HOMEPAGE_PORT. Browsing by hostname / Tailscale name
      # / reverse-proxy domain? Set HOMEPAGE_ALLOWED_HOSTS in .env (comma-list) or
      # Homepage serves a blank "host validation failed" page.
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-${SERVER_IP}:${HOMEPAGE_PORT}}

      # ---- Port/IP aliases (forwarded from .env) ----
      - HOMEPAGE_VAR_SERVER_IP=${SERVER_IP}
      # Proxmox host for the virtualization tile. Defaults to SERVER_IP (the
      # common single-box case); set PROXMOX_HOST in .env if Proxmox lives
      # elsewhere. The widget also needs the API-token vars further down.
      - HOMEPAGE_VAR_PROXMOX_HOST=${PROXMOX_HOST:-${SERVER_IP}}
      - HOMEPAGE_VAR_ARCANE_PORT=${ARCANE_PORT}
      - HOMEPAGE_VAR_ADGUARD_PORT=${ADGUARD_PORT}
      - HOMEPAGE_VAR_SYNCTHING_PORT=${SYNCTHING_PORT}
      - HOMEPAGE_VAR_NTFY_PORT=${NTFY_PORT}
      - HOMEPAGE_VAR_UPTIME_KUMA_PORT=${UPTIME_KUMA_PORT}
      - HOMEPAGE_VAR_DOZZLE_PORT=${DOZZLE_PORT}
      - HOMEPAGE_VAR_DIUN_PORT=${DIUN_PORT}
      - HOMEPAGE_VAR_JELLYFIN_PORT=${JELLYFIN_PORT}
      - HOMEPAGE_VAR_SEERR_PORT=${SEERR_PORT}
      - HOMEPAGE_VAR_NAVIDROME_PORT=${NAVIDROME_PORT}
      - HOMEPAGE_VAR_AUDIOBOOKSHELF_PORT=${AUDIOBOOKSHELF_PORT}
      - HOMEPAGE_VAR_BITTORRENT_PORT=${BITTORRENT_PORT}
      - HOMEPAGE_VAR_SABNZBD_PORT=${SABNZBD_PORT}
      - HOMEPAGE_VAR_SONARR_PORT=${SONARR_PORT}
      - HOMEPAGE_VAR_RADARR_PORT=${RADARR_PORT}
      - HOMEPAGE_VAR_LIDARR_PORT=${LIDARR_PORT}
      - HOMEPAGE_VAR_PROWLARR_PORT=${PROWLARR_PORT}
      - HOMEPAGE_VAR_BAZARR_PORT=${BAZARR_PORT}
      - HOMEPAGE_VAR_MEALIE_PORT=${MEALIE_PORT}
      - HOMEPAGE_VAR_KITCHENOWL_PORT=${KITCHENOWL_PORT}
      - HOMEPAGE_VAR_DONETICK_PORT=${DONETICK_PORT}
      - HOMEPAGE_VAR_ACTUAL_PORT=${ACTUAL_PORT}
      - HOMEPAGE_VAR_PAPERLESS_PORT=${PAPERLESS_PORT}
      - HOMEPAGE_VAR_STIRLING_PORT=${STIRLING_PORT}
      - HOMEPAGE_VAR_MEMOS_PORT=${MEMOS_PORT}
      - HOMEPAGE_VAR_VAULTWARDEN_PORT=${VAULTWARDEN_PORT}
      - HOMEPAGE_VAR_IMMICH_PORT=${IMMICH_PORT}
      - HOMEPAGE_VAR_WGER_PORT=${WGER_PORT}

      # ---- Widget API keys / credentials ----
      # Every value is forwarded from an un-prefixed base var in .env, so each
      # key is set in exactly one place. Homepage needs the HOMEPAGE_VAR_ prefix
      # in its config, so we add it here rather than duplicating it in .env.
      - HOMEPAGE_VAR_JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - HOMEPAGE_VAR_SEERR_API_KEY=${SEERR_API_KEY}
      - HOMEPAGE_VAR_NAVIDROME_USER=${NAVIDROME_USER}
      - HOMEPAGE_VAR_NAVIDROME_TOKEN=${NAVIDROME_TOKEN}
      - HOMEPAGE_VAR_NAVIDROME_SALT=${NAVIDROME_SALT}
      - HOMEPAGE_VAR_AUDIOBOOKSHELF_TOKEN=${AUDIOBOOKSHELF_TOKEN}
      - HOMEPAGE_VAR_APP_USERNAME=${APP_USERNAME}
      - HOMEPAGE_VAR_APP_PASSWORD=${APP_PASSWORD}
      - HOMEPAGE_VAR_SABNZBD_API_KEY=${SABNZBD_API_KEY}
      - HOMEPAGE_VAR_SONARR_API_KEY=${SONARR_API_KEY}
      - HOMEPAGE_VAR_RADARR_API_KEY=${RADARR_API_KEY}
      - HOMEPAGE_VAR_LIDARR_API_KEY=${LIDARR_API_KEY}
      - HOMEPAGE_VAR_PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - HOMEPAGE_VAR_BAZARR_API_KEY=${BAZARR_API_KEY}
      - HOMEPAGE_VAR_MEALIE_API_KEY=${MEALIE_API_KEY}
      - HOMEPAGE_VAR_PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - HOMEPAGE_VAR_PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - HOMEPAGE_VAR_ADGUARD_USERNAME=${ADGUARD_USERNAME}
      - HOMEPAGE_VAR_ADGUARD_PASSWORD=${ADGUARD_PASSWORD}
      - HOMEPAGE_VAR_IMMICH_API_KEY=${IMMICH_API_KEY}
      # Proxmox API token for the virtualization widget (node CPU/RAM, VMs/LXCs).
      # Create it in Proxmox: Datacenter → Permissions → API Tokens. Use
      # `user@realm!tokenid` (e.g. root@pam!homepage) as the ID + its secret.
      - HOMEPAGE_VAR_PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      # Home Assistant lives on its own VM — full URL (http://ha-ip:8123) + a
      # long-lived access token (HA → Profile → Long-Lived Access Tokens).
      - HOMEPAGE_VAR_HASS_URL=${HASS_URL}
      - HOMEPAGE_VAR_HASS_TOKEN=${HASS_TOKEN}
      # Proxmox (and some HA setups) serve HTTPS with a self-signed cert, which
      # Homepage rejects by default — leaving the Proxmox widget blank and its
      # monitor red. Uncomment to let Homepage accept self-signed certs on your
      # LAN. This relaxes outbound TLS verification for ALL widgets; on a homelan
      # where everything else is plain http that's a fine trade-off.
      # - NODE_TLS_REJECT_UNAUTHORIZED=0
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@dash: "host dash.${DOMAIN}"
      caddy.handle: "@dash"
      caddy.handle.reverse_proxy: "{{upstreams 3000}}"
    networks:
      - home

  # ===========================================================================
  # DOCKER SOCKET PROXY - least-privilege, read-only gateway to the Docker API
  #
  # Homepage needs the Docker API to show each tile's live up/down dot + CPU/RAM.
  # Reading /var/run/docker.sock directly requires running Homepage as root (or in
  # the host's docker group); since Homepage runs as PUID/PGID it otherwise can't
  # read the socket and every tile shows "unknown". This proxy mounts the socket
  # as root and exposes ONLY the read-only Containers API on the internal `home`
  # network, so Homepage stays non-root. Not published to the host — reachable
  # only as `dockerproxy:2375` from other containers on the network.
  # https://gethomepage.dev/configs/docker/
  # ===========================================================================
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1   # allow the read-only containers API (status + stats)
      - POST=0         # deny every write/POST endpoint — strictly read-only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - home

networks:
  home:
    external: true

---
# Homepage Widgets
# Shows system stats + a search bar at the top of the dashboard

- resources:
    cpu: true
    memory: true
    disk: /            # NOTE: shows the Homepage container's disk. To report the
                       # host data disk, bind-mount it and point this at that path.
    label: Server

- search:
    provider: duckduckgo
    target: _blank

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hour12: true

# Weather — disabled until you add your coordinates (it errors with placeholders).
# Find yours at https://www.latlong.net, then uncomment and fill in:

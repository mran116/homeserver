---
# Homepage Widgets — top info/header bar (system stats + clock + search + weather)
# The disk readouts need host paths mounted into the Homepage container
# (see dashboard/docker-compose.yml): ${CONFIG_PATH} -> /mnt/host/local,
# ${MEDIA_PATH} -> /mnt/host/media.
#
# NOTE: cputemp is intentionally OFF. CPU temperature needs real hardware thermal
# sensors (/sys/class/thermal), which a Proxmox VM does not have — so it would
# only ever read blank. On bare metal or a privileged LXC you can add
# `cputemp: true` back (the /sys/class/thermal mount is still in the compose). To
# show a temperature anyway, surface one your Home Assistant already tracks via a
# `custom:` entity on the Home Assistant tile in services.yaml.

- resources:
    label: System
    cpu: true
    memory: true
    uptime: true
    expanded: true

- resources:
    label: Local
    disk: /mnt/host/local   # the SSD/NVMe where CONFIG_PATH lives

- resources:
    label: Media
    disk: /mnt/host/media   # the media library (NAS)

- datetime:
    text_size: xl
    format:
      timeStyle: short
      hour12: true

- search:
    provider: duckduckgo
    target: _blank

# Weather — fill in YOUR coordinates, then uncomment (placeholders error out).
# Find them at https://www.latlong.net
# - openmeteo:
#     label: Weather
#     latitude: 00.0000
#     longitude: -00.0000

---
# Homepage Docker integration
# https://gethomepage.dev/configs/docker/
#
# Lets Homepage read the docker socket (bind-mounted read-only in
# docker-compose.yml) so every service tile shows a LIVE up/down status dot plus
# CPU/RAM. Services opt in via `server: my-docker` + `container: <name>` in
# services.yaml — a stopped/crashed container then shows red instead of
# vanishing. Aggregate up/down + history still lives in the Uptime Kuma widget.
my-docker:
  socket: /var/run/docker.sock

---
# Homepage Docker integration
# https://gethomepage.dev/configs/docker/
#
# Homepage reads the Docker API through the read-only `dockerproxy` service (see
# dashboard/docker-compose.yml) instead of the raw socket, so it can stay
# non-root and still show a LIVE up/down status dot plus CPU/RAM on every tile.
# Services opt in via `server: my-docker` + `container: <name>` in services.yaml
# — a stopped/crashed container then shows red instead of vanishing. Aggregate
# up/down + history still lives in the Uptime Kuma widget.
my-docker:
  host: dockerproxy
  port: 2375

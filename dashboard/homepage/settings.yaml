---
# Homepage Settings — https://gethomepage.dev/configs/settings/
# Dark "tech dashboard" look. The cyan/teal accent + glass cards come from
# custom.css (mirrored to CONFIG_PATH/homepage by make-dirs alongside this file).

title: Home
theme: dark
color: zinc            # neutral near-black base; accent is set in custom.css

headerStyle: clean
statusStyle: dot       # clean coloured dot instead of the "running/unknown" text
target: _blank
useEqualHeights: false # tiles size to content (compact) — no stretched empty space
hideVersion: true
hideErrors: true       # don't surface raw widget API errors (e.g. a key not set yet)

# SINGLE PAGE — everything visible at once, no tabs. `style: column` lets the
# sections pack SIDE BY SIDE in a responsive grid (the key fix: `style: row`
# would force each section full-width into a stacked band). The two former
# one-app sections are COMBINED, not deleted: Vaultwarden lives in
# "Monitoring & Security", wger in "Household".
#
# `columns` is the number of tile-columns each section is wide — smaller = a
# narrower section that packs more per row. These are a sensible starting point;
# nudge them after seeing it live (Homepage hot-reloads) if the packing isn't
# perfect on your screen width.
layout:
  Infrastructure:
    style: column
    columns: 2
  Monitoring & Security:
    style: column
    columns: 2
  Media:
    style: column
    columns: 2
  Downloads:
    style: column
    columns: 2
  Household:
    style: column
    columns: 2
  Records:
    style: column
    columns: 1
  Cloud:
    style: column
    columns: 1

---
# Homepage Settings — https://gethomepage.dev/configs/settings/
# Dark "tech dashboard" look. The cyan/teal accent + glass cards come from
# custom.css (mirrored to CONFIG_PATH/homepage by make-dirs alongside this file).

title: Home
theme: dark
color: zinc            # neutral near-black base; accent is set in custom.css

headerStyle: clean
statusStyle: dot       # clean coloured dot instead of the "running/unknown" text
target: _blank
useEqualHeights: true  # every tile in a row is the same height — uniform, never ragged
hideVersion: true
hideErrors: true       # don't surface raw widget API errors (e.g. a key not set yet)

# SINGLE PAGE — everything visible, no tabs. Each section is a full-width band
# (`style: row`) with a uniform 4-up grid of EQUAL-HEIGHT tiles, so sizes never
# mismatch and the page reads as deliberate (no gaps that look like a bug). It's
# a bit taller than a packed side-by-side layout, but it's predictable and clean.
# The two former one-app sections are COMBINED, not deleted: Vaultwarden lives in
# "Monitoring & Security", wger in "Household". Homepage drops to fewer columns
# automatically on narrow screens (tablet/phone).
layout:
  Infrastructure:
    style: row
    columns: 4
  Monitoring & Security:
    style: row
    columns: 4
  Media:
    style: row
    columns: 4
  Downloads:
    style: row
    columns: 4
  Household:
    style: row
    columns: 4
  Records:
    style: row
    columns: 4
  Cloud:
    style: row
    columns: 4

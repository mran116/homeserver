---
# Homepage Services
# https://gethomepage.dev/configs/services/
#
# All IPs/ports/keys come from .env via HOMEPAGE_VAR_* (forwarded by
# dashboard/docker-compose.yml) — .env stays the single source of truth.
#
# `server: my-docker` + `container:` (see docker.yaml) make each tile show a LIVE
# up/down status dot + CPU/RAM, and keep the tile visible (red) when a container
# is down — so this list is the source of truth for "what exists", Docker for
# "is it up". Tiles without a local container (Tailscale, Cloudflare) omit them.

- Infrastructure:
    - Arcane:
        icon: arcane.png
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:{{HOMEPAGE_VAR_ARCANE_PORT}}
        siteMonitor: http://{{HOMEPAGE_VAR_SERVER_IP}}:{{HOMEPAGE_VAR_ARCANE_PORT}}
        description: Docker Management
        server: my-docker
        container: arcane

    # Caddy is config-as-code (routes from container labels) — no admin UI to
    # link, so this tile is just a live up/down dot from the container.
    - Caddy:
        icon: caddy.png
        description: Reverse Proxy & HTTPS
        server: my-docker
        container: caddy

    - Tailscale:
        icon: tailscale.png
        href: https://login.tailscale.com/admin
        description: Private VPN

    - Cloudflare:
        icon: cloudflare.png
        href: https://dash.cloudflare.com
        description: Tunnel & DNS

    - AdGuard Home:
        icon: adguard-home.png
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:{{HOMEPAGE_VAR_ADGUARD_PORT}}
        siteMonitor: http://{{HOMEPAGE_VAR_SERVER_IP}}:{{HOMEPAGE_VAR_ADGUARD_PORT}}
        description: DNS Ad-Blocking
        server: my-docker
        container: adguard
    # Proxmox is the hypervisor host, not a container on this Docker engine, so it
    # has no `server`/`container` dot. `siteMonitor` gives it a live up/down dot
    # by polling the web UI; the widget shows the node (CPU/RAM, running VMs/LXCs).
    # Needs PROXMOX_* in .env. NOTE: Proxmox uses a self-signed cert by default —
    # if the dot stays red / the widget stays blank, enable self-signed TLS for
    # Homepage (see NODE_TLS_REJECT_UNAUTHORIZED in dashboard/docker-compose.yml).
    - Proxmox:
        icon: proxmox.png
        href: https://{{HOMEPAGE_VAR_PROXMOX_HOST}}:8006
        description: Virtualization Host
        siteMonitor: https://{{HOMEPAGE_VAR_PROXMOX_HOST}}:8006
        widget:
          type: proxmox
          url: https://{{HOMEPAGE_VAR_PROXMOX_HOST}}:8006
          username: {{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}
          password: {{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}

    # Home Assistant runs on its OWN VM (not this Docker engine), so like Proxmox
    # it has no container dot — `siteMonitor` gives it a live up/down, and the
    # widget pulls metrics over HA's API. Fill HASS_URL/HASS_TOKEN in .env
    # (HA: Profile → Long-Lived Access Tokens → Create Token). Uncomment `custom:`
    # to surface specific sensors — e.g. a temperature HA already tracks, which is
    # the way to get a "CPU temp" reading the VM itself can't provide.
    - Home Assistant:
        icon: home-assistant.png
        href: {{HOMEPAGE_VAR_HASS_URL}}
        description: Smart Home
        siteMonitor: {{HOMEPAGE_VAR_HASS_URL}}
        widget:
          type: homeassistant
          url: {{HOMEPAGE_VAR_HASS_URL}}
          key: {{HOMEPAGE_VAR_HASS_TOKEN}}
          # custom:
          #   - state: sensor.processor_temperature   # e.g. HA's System Monitor / Proxmox temp
          #     label: CPU
          #   - state: sensor.home_power
          #     label: Power
          #   - template: "{{ states.light | selectattr('state','eq','on') | list | count }}"
          #     label: Lights on


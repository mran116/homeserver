services:

  # ===========================================================================
  # DOCKGE - Compose-native stack manager
  # http://${SERVER_IP}:${DOCKGE_PORT}
  #
  # Reads and writes the docker-compose.yml files in this repo directly,
  # so every UI action is visible in git diff. No drift between Dockge
  # UI state and the repo.
  #
  # On first run, point Dockge at the parent stacks directory.
  # The bind mount below maps the on-host stacks dir to /opt/stacks
  # inside the container; DOCKGE_STACKS_DIR tells Dockge to scan it.
  #
  # Deploy this first — every other stack is managed through it.
  # ===========================================================================
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped
    ports:
      - "${DOCKGE_PORT}:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_PATH}/dockge:/app/data
      # Bind the directory that holds every stack (this repo on the host).
      # Adjust the host path if your repo lives elsewhere.
      - /opt/docker/stacks:/opt/stacks
    environment:
      - TZ=${TZ}
      - DOCKGE_STACKS_DIR=/opt/stacks
    networks:
      - home

networks:
  home:
    external: true

services:

  # ===========================================================================
  # PAPERLESS-NGX - Document Management
  # http://${SERVER_IP}:${PAPERLESS_PORT}
  # Scan docs with phone → upload → searchable forever
  # Mobile app: Paperless-ngx (iOS/Android)
  # ===========================================================================
  paperless-broker:
    image: redis:7
    container_name: paperless-broker
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ${CONFIG_PATH}/paperless/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - home

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/paperless/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - home

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    mem_limit: 2g            # OCR / gotenberg spikes during ingest
    ports:
      - "${PAPERLESS_PORT}:8000"
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-broker:
        condition: service_healthy
    volumes:
      - ${CONFIG_PATH}/paperless/data:/usr/src/paperless/data
      - ${CONFIG_PATH}/paperless/media:/usr/src/paperless/media
      - ${CONFIG_PATH}/paperless/export:/usr/src/paperless/export
      - ${DOCS_PATH}/consume:/usr/src/paperless/consume
    environment:
      - PAPERLESS_REDIS=redis://paperless-broker:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD}
      - PAPERLESS_URL=http://${SERVER_IP}:${PAPERLESS_PORT}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_TIME_ZONE=${TZ}
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@paperless: "host paperless.${DOMAIN}"
      caddy.handle: "@paperless"
      caddy.handle.reverse_proxy: "{{upstreams 8000}}"
    networks:
      - home

  # ===========================================================================
  # STIRLING PDF - PDF manipulation toolkit
  # http://${SERVER_IP}:${STIRLING_PORT}
  # Merge, split, compress, convert, sign PDFs
  # RAM: ~200MB
  # ===========================================================================
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "${STIRLING_PORT}:8080"
    volumes:
      - ${CONFIG_PATH}/stirling/configs:/configs
      - ${CONFIG_PATH}/stirling/logs:/logs
    environment:
      - TZ=${TZ}
      - DOCKER_ENABLE_SECURITY=false
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@pdf: "host pdf.${DOMAIN}"
      caddy.handle: "@pdf"
      caddy.handle.reverse_proxy: "{{upstreams 8080}}"
    networks:
      - home


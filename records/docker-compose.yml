services:

  # ===========================================================================
  # PAPERLESS-NGX - Document Management
  # http://${SERVER_IP}:${PAPERLESS_PORT}
  # Scan docs with phone → upload → searchable forever
  # Mobile app: Paperless-ngx (iOS/Android)
  # ===========================================================================
  paperless-broker:
    image: redis:7
    container_name: paperless-broker
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/paperless/redis:/data
    networks:
      - home

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/paperless/db:/var/lib/postgresql/data
    networks:
      - home

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    ports:
      - "${PAPERLESS_PORT}:8000"
    depends_on:
      - paperless-db
      - paperless-broker
    volumes:
      - ${CONFIG_PATH}/paperless/data:/usr/src/paperless/data
      - ${CONFIG_PATH}/paperless/media:/usr/src/paperless/media
      - ${CONFIG_PATH}/paperless/export:/usr/src/paperless/export
      - ${DOCS_PATH}/consume:/usr/src/paperless/consume
    environment:
      - PAPERLESS_REDIS=redis://paperless-broker:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD}
      - PAPERLESS_URL=http://${SERVER_IP}:${PAPERLESS_PORT}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_TIME_ZONE=${TZ}
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
    networks:
      - home

  # ===========================================================================
  # PAPERLESS-AI - Auto title / tag / classify scans using local Ollama
  # http://${SERVER_IP}:${PAPERLESS_AI_PORT}
  #
  # First-run setup (web UI wizard):
  #   - Paperless URL:  http://paperless:8000
  #   - Paperless API token: create in Paperless (Settings -> "API Token"),
  #     paste here or set PAPERLESS_AI_TOKEN in .env
  #   - AI provider: Ollama   |   URL: http://ollama:11434   |   model: qwen2.5:7b
  #
  # VALUE TIP: in the UI, restrict it to your EXISTING tags (don't let it invent
  # tags) — that keeps tagging clean. Its big wins are titles + correspondent +
  # document type. Runs in the background, so CPU speed is fine.
  # ===========================================================================
  paperless-ai:
    image: clusterzx/paperless-ai:latest
    container_name: paperless-ai
    restart: unless-stopped
    ports:
      - "${PAPERLESS_AI_PORT}:3000"
    volumes:
      - ${CONFIG_PATH}/paperless-ai:/app/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PAPERLESS_API_URL=http://paperless:8000/api
      - PAPERLESS_API_TOKEN=${PAPERLESS_AI_TOKEN}
      - AI_PROVIDER=ollama
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - SCAN_INTERVAL=*/30 * * * *
      - RAG_SERVICE_ENABLED=false
    depends_on:
      - paperless
    networks:
      - home

  # ===========================================================================
  # STIRLING PDF - PDF manipulation toolkit
  # http://${SERVER_IP}:${STIRLING_PORT}
  # Merge, split, compress, convert, sign PDFs
  # RAM: ~200MB
  # ===========================================================================
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "${STIRLING_PORT}:8080"
    volumes:
      - ${CONFIG_PATH}/stirling/configs:/configs
      - ${CONFIG_PATH}/stirling/logs:/logs
    environment:
      - TZ=${TZ}
      - DOCKER_ENABLE_SECURITY=false
    networks:
      - home

  # ===========================================================================
  # DOCUSEAL - Legally binding document signing
  # COMMENTED OUT - Requires SMTP/email setup first
  # Compliant with ESIGN, UETA, eIDAS
  # Setup:
  #   1. Set up domain and Cloudflare Email Routing
  #   2. Configure Gmail SMTP credentials in .env
  #   3. Uncomment this service
  # ===========================================================================
  # docuseal:
  #   image: docuseal/docuseal:latest
  #   container_name: docuseal
  #   restart: unless-stopped
  #   ports:
  #     - "${DOCUSEAL_PORT}:3000"
  #   volumes:
  #     - ${CONFIG_PATH}/docuseal:/data
  #   environment:
  #     - TZ=${TZ}
  #     - SECRET_KEY_BASE=${DOCUSEAL_SECRET_KEY}
  #     - DATABASE_URL=sqlite3:/data/docuseal.sqlite3
  #     - SMTP_ADDRESS=${SMTP_ADDRESS}
  #     - SMTP_PORT=${SMTP_PORT}
  #     - SMTP_USERNAME=${SMTP_USERNAME}
  #     - SMTP_PASSWORD=${SMTP_PASSWORD}
  #     - SMTP_FROM=${SMTP_FROM}
  #   networks:
  #     - home

networks:
  home:
    external: true

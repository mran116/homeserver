services:

  # ===========================================================================
  # MEMOS - Frictionless quick-capture notes (a private, self-hosted scratchpad)
  # http://${SERVER_IP}:${MEMOS_PORT}
  # Markdown, tags, instant capture. Great for "remember this" without ceremony.
  # ===========================================================================
  memos:
    image: ghcr.io/usememos/memos:stable
    container_name: memos
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/memos:/var/opt/memos
    ports:
      - "${MEMOS_PORT}:5230"
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # BOOKSTACK - The family knowledge base / house manual
  # http://${SERVER_IP}:${BOOKSTACK_PORT}
  #
  # Structured wiki for the stuff everyone forgets: wifi passwords, water/gas
  # shutoffs, account info, vendor contacts, "how the thermostat works". Cuts
  # the "ask the person who knows" load.
  #
  # FIRST-RUN SECRET: APP_KEY must be a real key. Generate it once with:
  #   docker run --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
  # then paste the output (starts with "base64:") into BOOKSTACK_APP_KEY in .env.
  # Default login after first boot: admin@admin.com / password (change it!).
  # ===========================================================================
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_URL=http://${SERVER_IP}:${BOOKSTACK_PORT}
      - APP_KEY=${BOOKSTACK_APP_KEY}
      - DB_HOST=bookstack-db
      - DB_PORT=3306
      - DB_DATABASE=bookstackapp
      - DB_USERNAME=bookstack
      - DB_PASSWORD=${BOOKSTACK_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/bookstack/app:/config
    ports:
      - "${BOOKSTACK_PORT}:80"
    depends_on:
      - bookstack-db
    networks:
      - home
    restart: unless-stopped

  bookstack-db:
    image: mariadb:lts
    container_name: bookstack-db
    environment:
      - MARIADB_ROOT_PASSWORD=${BOOKSTACK_DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=bookstackapp
      - MARIADB_USER=bookstack
      - MARIADB_PASSWORD=${BOOKSTACK_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/bookstack/db:/var/lib/mysql
    networks:
      - home
    restart: unless-stopped

networks:
  home:
    external: true

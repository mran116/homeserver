---
# One entrypoint for every host. Each role self-skips unless that host's vars
# opt in, so the same playbook safely targets a bare box, a tuned bare-metal
# node, or a friend's machine — behaviour comes entirely from host_vars.
#
#   ansible all -m ping                      # connectivity
#   ansible-playbook site.yml --check --diff # PREVIEW (no changes)
#   ansible-playbook site.yml                # apply
#   ansible-playbook site.yml --limit myhost # one host
- name: Provision homeserver host(s)
  hosts: all
  become: true
  roles:
    - base
    - kernel_cmdline
    - cpu_turbo
    - smart_monitoring
    - nfs_mounts
    - homeserver_stack

# Ansible for provisioning a homeserver HOST. Run from the ansible/ dir.
#
# Agentless — rides plain SSH (your key mesh / ~/.ssh/config). No control node,
# no daemons. Point it at any box (yours or a friend's), fill in that host's
# vars, and it provisions the host layer + hands off to this repo's bootstrap.
#
# SCOPE: the HOST (OS packages, kernel/grub, fstab mounts, systemd, smartd) and
# cloning+bootstrapping THIS repo. It does NOT manage the running containers —
# that stays the repo's job (`hs`). Appliances (Synology/HAOS/OpenWrt) are out
# of scope; manage those via their own UI/API.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
result_format = yaml          # pretty task output (non-deprecated)
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent
nocows = True

[ssh_connection]
pipelining = True

---
- name: Ensure NFS client is installed
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: nfs_mounts | length > 0

- name: Ensure mount points exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ nfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"

- name: Configure NFS mounts (fstab) and mount them
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ item.opts | default(nfs_mount_opts) }}"
    state: mounted
  loop: "{{ nfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"

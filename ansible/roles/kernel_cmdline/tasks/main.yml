---
# kernel_cmdline_params is the AUTHORITATIVE set for GRUB_CMDLINE_LINUX_DEFAULT
# (plus a leading `quiet`). List every param the box should boot with.
- name: Set GRUB_CMDLINE_LINUX_DEFAULT
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: >-
      GRUB_CMDLINE_LINUX_DEFAULT="{{
        ((['quiet'] if kernel_cmdline_keep_quiet else []) + kernel_cmdline_params) | join(' ')
      }}"
    backup: true
  when: kernel_cmdline_params | length > 0
  notify: update grub

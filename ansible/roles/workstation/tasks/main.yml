---
- name: Install workstation packages
  ansible.builtin.apt:
    name: "{{ workstation_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: workstation_packages | length > 0

# --- Leak-guard --------------------------------------------------------------
- name: Ensure leak-guard dir exists
  ansible.builtin.file:
    path: "{{ workstation_leak_guard_dir }}"
    state: directory
    mode: "0755"
  when: workstation_leak_guard_enabled

- name: Install the leak-guard script
  ansible.builtin.template:
    src: leak-guard.sh.j2
    dest: "{{ workstation_leak_guard_dir }}/leak-guard.sh"
    mode: "0755"
  when: workstation_leak_guard_enabled

- name: Write the denylist (PII patterns from host_vars)
  ansible.builtin.copy:
    dest: "{{ workstation_leak_guard_dir }}/denylist.txt"
    mode: "0600"
    content: |
      # Managed by Ansible (roles/workstation). One regex per line.
      {% for p in workstation_leak_patterns %}
      {{ p }}
      {% endfor %}
  when: workstation_leak_guard_enabled

- name: Wire the leak-guard as a pre-commit hook in each target repo
  ansible.builtin.copy:
    dest: "{{ item }}/.git/hooks/pre-commit"
    mode: "0755"
    content: |
      #!/bin/sh
      # Managed by Ansible (roles/workstation).
      exec "{{ workstation_leak_guard_dir }}/leak-guard.sh"
  loop: "{{ workstation_leak_guard_repos }}"
  loop_control:
    label: "{{ item }}"
  when:
    - workstation_leak_guard_enabled
    - workstation_leak_guard_repos | length > 0

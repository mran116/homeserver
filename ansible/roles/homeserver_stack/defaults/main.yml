---
homeserver_stack_enabled: false
install_docker: false
# Who owns the checkout (the user that will run `hs` / own /opt/docker/data).
homeserver_stack_owner: "{{ ansible_user }}"

# Deploy the FULL stack non-interactively (bootstrap.sh --yes + bring every
# stack up). Off by default — turning this on starts ~28 containers. It
# auto-generates MACHINE secrets only; external tokens (VPN/WireGuard,
# Cloudflare, indexer API keys) stay blank and need `hs keys` + manual entry
# afterward, so VPN-gated and cert/external services aren't fully live until
# then.
homeserver_deploy: false

# homeserver_repo_url + homeserver_stack_dir come from group_vars/all.yml.

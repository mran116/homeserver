services:

  # ===========================================================================
  # NTFY - Self-hosted push notifications hub
  # http://${SERVER_IP}:${NTFY_PORT}
  #
  # One endpoint everything can POST to -> a push on your phone. Wire it into
  # Proxmox notifications, cron jobs, backup scripts, the *arr stack, etc.
  #   curl -d "Backup done" http://${SERVER_IP}:${NTFY_PORT}/home
  # Install the ntfy app and subscribe to your topics.
  #
  # Open by default for LAN use. To require accounts, set:
  #   NTFY_AUTH_DEFAULT_ACCESS=deny-all   then create users with `ntfy user add`.
  # ===========================================================================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    environment:
      - TZ=${TZ}
      - NTFY_BASE_URL=http://${SERVER_IP}:${NTFY_PORT}
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ${CONFIG_PATH}/ntfy/cache:/var/cache/ntfy
      - ${CONFIG_PATH}/ntfy/lib:/var/lib/ntfy
      - ${CONFIG_PATH}/ntfy/etc:/etc/ntfy
    ports:
      - "${NTFY_PORT}:80"
    networks:
      - home
    restart: unless-stopped

networks:
  home:
    external: true

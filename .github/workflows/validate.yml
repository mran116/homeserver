name: validate

# Free CI: validates every stack's compose + the helper scripts on each PR and
# on pushes to main, and scans for leaked secrets. Deploys nothing — it just
# keeps `main` known-good for you and anyone who clones the repo. (Free/unlimited
# on public repos; well within the free monthly minutes on private — seconds.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (all stacks)
        run: |
          cp .env.example .env
          fail=0
          for f in */docker-compose.yml; do
            if docker compose -f "$f" --env-file .env config -q 2>/dev/null; then
              echo "ok      $f"
            else
              # a stack with all services commented (e.g. devops placeholder)
              # fails config with "no services" — that's intentional, not broken.
              active=$(awk '/^services:/{i=1;next} /^[^[:space:]#]/{i=0} i&&/^  [A-Za-z0-9_-]+:[[:space:]]*$/{n++} END{print n+0}' "$f")
              if [ "${active:-0}" -eq 0 ]; then echo "skip    $f (placeholder)"; else echo "INVALID $f"; fail=1; fi
            fi
          done
          exit $fail

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: for s in hs bootstrap.sh scripts/*.sh scripts/*.bash scripts/lib/*.sh mediastack/gluetun/update-port.sh; do bash -n "$s" && echo "ok $s"; done
      - name: shellcheck (gate on warnings and errors)
        # Fails the build on warning+ severity. Style "notes" stay advisory below.
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S warning -x hs bootstrap.sh scripts/*.sh scripts/lib/*.sh mediastack/gluetun/update-port.sh
      - name: shellcheck style notes (advisory)
        run: shellcheck -x hs bootstrap.sh scripts/*.sh scripts/lib/*.sh mediastack/gluetun/update-port.sh || true

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: py_compile (gate)
        run: for p in scripts/*.py; do python -m py_compile "$p" && echo "ok $p"; done
      - name: ruff lint (advisory)
        run: |
          pip install --quiet ruff
          ruff check scripts/ || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint — Dockerfile lint (advisory)
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /tmp/hadolint
          chmod +x /tmp/hadolint
          find . -name Dockerfile -print0 | xargs -0 -r -n1 /tmp/hadolint || true
      - name: actionlint — GitHub Actions lint (advisory)
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color || true
      - name: yamllint — compose/config YAML (advisory)
        run: |
          pip install --quiet yamllint
          yamllint -d relaxed . || true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (scan tracked files for committed secrets)
        # Pinned binary — no Action/license/telemetry. Scans the checked-out
        # tree; real secrets live in .env (gitignored) + Vaultwarden, never here.
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --no-banner --redact

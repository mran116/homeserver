services:

  # ===========================================================================
  # IMMICH - Photo & Video Backup
  # http://${SERVER_IP}:${IMMICH_PORT}
  # Mobile app: Immich (iOS/Android) - auto backup camera roll
  #
  # Setup after deploy:
  #   1. Create admin account
  #   2. Create accounts for each family member
  #   3. Install Immich app on all phones
  #   4. Point app at http://${SERVER_IP}:${IMMICH_PORT}
  #   5. Enable auto backup on WiFi
  #
  # User setup for privacy:
  #   - Each person has their own library (private by default)
  #   - Create shared family album for everyone
  #   - Create private shared album between you and wife only
  #   - Kids cannot see adult content
  # ===========================================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    ports:
      - "${IMMICH_PORT}:3001"
    volumes:
      - ${PHOTOS_PATH}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      - immich-db
      - immich-redis
    networks:
      - home

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/immich/model-cache:/cache
    environment:
      - TZ=${TZ}
    networks:
      - home

  immich-redis:
    image: redis:7
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - home

  immich-db:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=immich
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - ${CONFIG_PATH}/immich/db:/var/lib/postgresql/data
    networks:
      - home

  # ===========================================================================
  # MATRIX + ELEMENT - Private encrypted messaging
  # COMMENTED OUT - Enable after domain and Cloudflare are set up
  # Requires external access to be useful (people message from outside network)
  #
  # Setup:
  #   1. Buy domain and set up Cloudflare Tunnel
  #   2. Configure SMTP in .env
  #   3. Update MATRIX_SERVER_NAME to your domain
  #   4. Uncomment and deploy
  #   5. Add matrix.yourdomain.com to Cloudflare routes
  #
  # Features:
  #   - End to end encrypted by default
  #   - Voice and video calls
  #   - File sharing
  #   - Disappearing messages
  #   - iOS and Android apps (Element)
  # ===========================================================================
  # synapse:
  #   image: matrixdotorg/synapse:latest
  #   container_name: synapse
  #   restart: unless-stopped
  #   ports:
  #     - "${MATRIX_PORT}:8008"
  #   volumes:
  #     - ${CONFIG_PATH}/synapse:/data
  #   environment:
  #     - TZ=${TZ}
  #     - SYNAPSE_SERVER_NAME=${MATRIX_SERVER_NAME}
  #     - SYNAPSE_REPORT_STATS=no
  #   networks:
  #     - home

networks:
  home:
    external: true

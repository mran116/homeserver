services:

  # ===========================================================================
  # IMMICH - Photo & Video Backup
  # http://${SERVER_IP}:${IMMICH_PORT}
  # Mobile app: Immich (iOS/Android) - auto backup camera roll
  #
  # Setup after deploy:
  #   1. Create admin account
  #   2. Create accounts for each family member
  #   3. Install Immich app on all phones
  #   4. Point app at http://${SERVER_IP}:${IMMICH_PORT}
  #   5. Enable auto backup on WiFi
  #
  # User setup for privacy:
  #   - Each person has their own library (private by default)
  #   - Create shared family album for everyone
  #   - Create private shared album between you and wife only
  #   - Kids cannot see adult content
  # ===========================================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    ports:
      - "${IMMICH_PORT}:2283"
    volumes:
      - ${PHOTOS_PATH}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    labels:
      caddy: "*.${DOMAIN}"
      caddy.@photos: "host photos.${DOMAIN}"
      caddy.handle: "@photos"
      caddy.handle.reverse_proxy: "{{upstreams 2283}}"
    networks:
      - home

  # Computer-vision models for smart search (CLIP) + face recognition — NOT an
  # LLM. Idle-light, but loads ~2-4 GB of models into RAM while indexing/face
  # jobs run. Low-RAM box? Set IMMICH_MACHINE_LEARNING_ENABLED=false on
  # immich-server and comment this service out; upload/backup still work fully.
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/immich/model-cache:/cache
    environment:
      - TZ=${TZ}
    networks:
      - home

  immich-redis:
    image: redis:7
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - home

  immich-db:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=immich
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - ${CONFIG_PATH}/immich/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich -d immich"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - home

# Matrix/Synapse was removed — high-maintenance, low family adoption (see the app
# review). Reach the family via HA notifications / the companion app instead. If
# you ever genuinely need a self-hosted Matrix server, recover the old service
# block from git history. Any existing data in ${CONFIG_PATH}/synapse is left on
# disk, untouched.

networks:
  home:
    external: true

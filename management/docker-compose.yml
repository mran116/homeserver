services:

  # ===========================================================================
  # HOMEPAGE - Central dashboard and service launcher
  # http://${SERVER_IP}:${HOMEPAGE_PORT}
  #
  # Config files live at ${CONFIG_PATH}/homepage/
  # Copy all homepage/*.yaml files there before deploying
  #
  # After deploy:
  #   1. Fill in API keys in services.yaml
  #   2. Add your coordinates in widgets.yaml for weather
  #   3. Update domain URLs in bookmarks.yaml when domain is ready
  # ===========================================================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${HOMEPAGE_PORT}:3000"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - HOMEPAGE_ALLOWED_HOSTS=${SERVER_IP}:${HOMEPAGE_PORT}
    volumes:
      - ${CONFIG_PATH}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - home

networks:
  home:
    external: true

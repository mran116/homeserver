# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
# =============================================================================
# Recyclarr — auto-sync TRaSH-Guides quality profiles to Sonarr and Radarr
#
# v8 NOTES (we hit these as gotchas):
#   - The `include:` directive looks up `includes.json` in the templates repo,
#     which is EMPTY in v8.  The files at /config/configs/*.yml are full
#     standalone configs (not includes), so we inline what we need below.
#   - `language:` is NOT a quality_profile field in recyclarr.  Sonarr v4 moved
#     language to per-series; Radarr keeps it per-profile but recyclarr doesn't
#     expose it.  Language filter is applied via scripts/seed-arr-quality.sh
#     (post-sync, direct API).
#
# Defaults below target 1080p WEB-DL for both apps (Radarr is WEB-only, no
# Bluray, to keep movie sizes ~3-6 GB instead of ~8-12 GB).  Override per movie
# from the Radarr UI when you want a "crazy good" copy.
# =============================================================================

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    # Quality-definition SIZE CAPS are deliberately NOT managed here. TRaSH's
    # `type: series` definition leaves 1080p sizes "Unlimited", which lets big
    # remuxes / over-bitrate WEB-DLs through. We own per-quality MB/min caps in
    # scripts/seed-arr-quality.sh instead (global caps: Bluray-1080p -> ~x264
    # encodes not DTS-HD MA remuxes; WEBDL/WEBRip-1080p bitrate-capped). Re-adding
    # a quality_definition block here would reset those caps on the nightly sync.

    quality_profiles:
      # TRaSH WEB-1080p profile.  Single entry — overrides at this level
      # (recyclarr merges trash_id-derived defaults with our customizations).
      - trash_id: 72dae194fc92bf828f32cde7744e51a1     # WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        # Full fallback chain for old shows (some 15+ years old) that may
        # only exist at SD quality.  `quality_sort: top` keeps current shows
        # grabbing the highest tier first; lower tiers only win when nothing
        # higher exists.  Cutoff stays at WEB 1080p, so any sub-1080p grab
        # still gets upgrade-searched if a 1080p release shows up later.
        qualities:
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: Bluray-720p
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD
          - name: Bluray-480p
          - name: SDTV

    custom_formats:
      # +50 for dual-audio releases so they win over single-language English.
      - trash_ids:
          - 7ba05c6e0e14e793538174c679126996     # MULTi (Sonarr trash id)
        assign_scores_to:
          - name: WEB-1080p
            score: 50
          - name: HD-1080p
            score: 50
      # -10000 backstop: any release Sonarr tags as purely non-English gets
      # crushed, even if the per-series language filter somehow misses it.
      - trash_ids:
          - 69aa1e159f97d860440b04cd6d590c4f     # Language: Not English (Sonarr trash id)
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
          - name: HD-1080p
            score: -10000

radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    # Quality-definition SIZE CAPS are deliberately NOT managed here (same as the
    # Sonarr block above). TRaSH's `type: movie` definition leaves 1080p/720p max
    # sizes "Unlimited", letting oversized movies through. We own per-quality
    # MB/min caps in scripts/seed-arr-quality.sh instead (1080p ~50 MB/min ~= ~6 GB
    # for a 2 h film; 720p ~25). Re-adding a quality_definition block here would
    # reset those caps on the nightly sync.

    quality_profiles:
      - name: WEB-Only
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        # Only qualities listed here are enabled.  Bluray-1080p, Remux-1080p,
        # and all 2160p tiers stay disabled.  To grab a "crazy good" copy of a
        # specific movie, use Radarr's interactive search (bypasses profile),
        # or switch that one movie to a higher-tier profile later.
        qualities:
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p

    custom_formats:
      # TRaSH "Unwanted" - score junk to -10000 so it can never satisfy the
      # WEB-Only profile (min_format_score 0 rejects any net-negative release).
      - trash_ids:
          - ed38b889b31be83fda192888e2286d83  # BR-DISK
          - 90a6f9a284dff5103f6346090e6280c8  # LQ
          - e204b80c87be9497a8a6eaff48f72905  # LQ (Release Title)
          - dc98083864ea246d05a42df0d05f81cc  # x265 (HD) - x265 at 1080p/720p
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
          - 0a3f082873eb454bde444150b70253cc  # Extras
        assign_scores_to:
          - name: WEB-Only
            score: -10000
      # TRaSH WEB-DL release-group tiers - prefer the better-encoded sources
      # (default TRaSH scores 1700 / 1650 / 1600).
      - trash_ids:
          - c20f169ef63c5f40c2def54abaf4438e  # WEB Tier 01
        assign_scores_to:
          - name: WEB-Only
            score: 1700
      - trash_ids:
          - 403816d65392c79236dcb6dd591aeda4  # WEB Tier 02
        assign_scores_to:
          - name: WEB-Only
            score: 1650
      - trash_ids:
          - af94e0fe497124d1f9ce732069ec8c3b  # WEB Tier 03
        assign_scores_to:
          - name: WEB-Only
            score: 1600

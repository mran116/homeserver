networks:
  home:
    external: true

services:

  # ===========================================================================
  # GLUETUN - VPN tunnel (ProtonVPN)
  # qBittorrent and SABnzbd route through this container
  # ===========================================================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING:-on}
      - VPN_PORT_FORWARDING_PROVIDER=${VPN_PORT_FORWARDING_PROVIDER:-protonvpn}
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh /gluetun/update-port.sh
      - QB_USERNAME=${APP_USERNAME}
      - QB_PASSWORD=${APP_PASSWORD}
      - QB_PORT=${BITTORRENT_PORT}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    ports:
      # qBittorrent WebUI is served via gluetun's network namespace.
      # Host port comes from .env; container-internal port matches WEBUI_PORT below.
      - ${BITTORRENT_PORT}:${BITTORRENT_PORT}
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # DOWNLOADERS - routed through Gluetun VPN
  # ===========================================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${BITTORRENT_PORT}
      - QB_USERNAME=${APP_USERNAME}
      - QB_PASSWORD=${APP_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - ${MEDIA_PATH}/torrents:/data/torrents
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sabnzbd:/config
      - ${MEDIA_PATH}/usenet:/data/usenet
    ports:
      - ${SABNZBD_PORT}:8080
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # JELLYFIN - Media server
  # ===========================================================================
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${MEDIA_PATH}/movies:/data/movies
      - ${MEDIA_PATH}/tv:/data/tv
      - ${MEDIA_PATH}/anime:/data/anime
      - ${MEDIA_PATH}/music:/data/music
      - ${MEDIA_PATH}/adult/movies:/data/adult/movies
      - ${MEDIA_PATH}/adult/series:/data/adult/series
      - ${MEDIA_PATH}/books:/data/books
      - ${MEDIA_PATH}/audiobooks:/data/audiobooks
    # Intel Quick Sync / VAAPI hardware transcoding (iGPU at /dev/dri).
    # 1) The Docker host (or VM) must expose /dev/dri — confirm: ls -l /dev/dri
    #    (on Proxmox, the iGPU must be passed through to this VM first).
    # 2) Set RENDER_GID in .env to the host's render group:
    #       getent group render | cut -d: -f3      (blank => falls back to "render")
    # 3) Enable it in Jellyfin: Dashboard -> Playback -> Transcoding ->
    #    Hardware acceleration: Intel QuickSync (QSV), device /dev/dri/renderD128.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-render}"
    ports:
      - ${JELLYFIN_PORT}:8096
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # SEERR - Media request management
  # ===========================================================================
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    volumes:
      - ${CONFIG_PATH}/seerr:/app/config
    ports:
      - ${SEERR_PORT}:5055
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # LIBRARY MANAGERS (*ARR apps)
  # ===========================================================================
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${RADARR_PORT}:7878
    networks:
      - home
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${SONARR_PORT}:8989
    networks:
      - home
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/lidarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${LIDARR_PORT}:8686
    networks:
      - home
    restart: unless-stopped

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
    volumes:
      - ${CONFIG_PATH}/whisparr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${WHISPARR_PORT}:6969
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # PROWLARR - Indexer manager
  # ===========================================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - ${PROWLARR_PORT}:9696
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # FLARESOLVERR - Cloudflare bypass for Prowlarr
  # ===========================================================================
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - ${FLARESOLVERR_PORT}:8191
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # BAZARR - Subtitle automation
  # ===========================================================================
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config
      - ${MEDIA_PATH}/movies:/data/movies
      - ${MEDIA_PATH}/tv:/data/tv
      - ${MEDIA_PATH}/anime:/data/anime
    ports:
      - ${BAZARR_PORT}:6767
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # UNPACKERR - Auto-extract completed downloads
  # ===========================================================================
  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:latest
    container_name: unpackerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # Service-to-service URLs use container-internal ports, NOT host ports.
      # Inside the `home` docker network, each *arr listens on its own image default.
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_0_PATHS_0=/data/torrents/movies
      - UN_RADARR_0_PATHS_1=/data/usenet/movies
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_0_PATHS_0=/data/torrents/tv
      - UN_SONARR_0_PATHS_1=/data/usenet/tv
      - UN_SONARR_0_PATHS_2=/data/torrents/anime
      - UN_SONARR_0_PATHS_3=/data/usenet/anime
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
      - UN_LIDARR_0_PATHS_0=/data/torrents/music
      - UN_LIDARR_0_PATHS_1=/data/usenet/music
      - UN_WHISPARR_0_URL=http://whisparr:6969
      - UN_WHISPARR_0_API_KEY=${WHISPARR_API_KEY}
      - UN_WHISPARR_0_PATHS_0=/data/torrents/adult
      - UN_WHISPARR_0_PATHS_1=/data/usenet/adult
    volumes:
      - ${MEDIA_PATH}/torrents:/data/torrents
      - ${MEDIA_PATH}/usenet:/data/usenet
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # AUDIOBOOKSHELF - Audiobooks, podcasts & ebooks server
  # ===========================================================================
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/audiobookshelf/config:/config
      - ${CONFIG_PATH}/audiobookshelf/metadata:/metadata
      - ${MEDIA_PATH}/audiobooks:/audiobooks
      - ${MEDIA_PATH}/books:/books
    ports:
      - ${AUDIOBOOKSHELF_PORT}:80
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # RECYCLARR - Auto-sync TRaSH Guides quality profiles
  # ===========================================================================
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8
    container_name: recyclarr
    init: true
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRON_SCHEDULE=@daily
      # API keys for the !env_var lookups in recyclarr.yml
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
    volumes:
      # Whole /config must be writable by PUID (recyclarr writes state, repos,
      # cache, logs there). The version-controlled recyclarr.yml is layered on
      # top, read-only. Ensure ${CONFIG_PATH}/recyclarr is owned by PUID:PGID.
      - ${CONFIG_PATH}/recyclarr:/config
      - ./recyclarr/recyclarr.yml:/config/recyclarr.yml:ro
    networks:
      - home
    restart: unless-stopped

  # ===========================================================================
  # DECLUTTARR - Auto-clean stalled / failed / slow / orphaned downloads
  #
  # Headless (no web UI). Watches the *arr queues and removes downloads that
  # stall, fail, import-fail, go missing, or run too slow, then has the *arr
  # grab an alternative — for BOTH torrents (qBittorrent) AND usenet (SABnzbd),
  # which is why it replaces Cleanuparr here. Config is the versioned
  # decluttarr/config.yaml; API keys are pulled from the env below (no secrets
  # in the file).
  #
  # qBittorrent rides Gluetun's network, so config.yaml points at
  # http://gluetun:8080. The download-client `name:` in config.yaml MUST match
  # the client name set in each *arr (Settings -> Download Clients) or Decluttarr
  # can't match them.
  #
  # SAFETY: ships with general.test_run=true — it only LOGS what it would remove.
  # Confirm connections in `docker logs decluttarr`, then set test_run=false in
  # mediastack/decluttarr/config.yaml and redeploy.
  # ===========================================================================
  decluttarr:
    image: ghcr.io/manimatter/decluttarr:latest
    container_name: decluttarr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      # Referenced by config.yaml via ${VAR} substitution (keeps secrets out of git).
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - WHISPARR_API_KEY=${WHISPARR_API_KEY}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
    volumes:
      - ./decluttarr/config.yaml:/app/config/config.yaml:ro
    networks:
      - home

  # ===========================================================================
  # NAVIDROME - Music server
  # ===========================================================================
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: ${PUID}:${PGID}
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/navidrome:/data
      - ${MEDIA_PATH}/music:/music:ro
    ports:
      - ${NAVIDROME_PORT}:4533
    networks:
      - home
    restart: unless-stopped

services:

  # ===========================================================================
  # ARCANE - Modern, compose-native Docker management UI
  # http://${SERVER_IP}:${ARCANE_PORT}
  #
  # Default login on first run:  arcane / arcane-admin  — change it immediately.
  #
  # Manages the docker-compose.yml files in this repo directly: the host stacks
  # dir (STACKS_PATH in .env) is mounted at /opt/stacks (Arcane's projects
  # directory), so UI edits and git stay in sync. bootstrap.sh sets STACKS_PATH
  # to wherever this repo lives, so it works even if it isn't /opt/docker/stacks.
  #
  # Deploy this first — every other stack is managed through it.
  # ===========================================================================
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - "${ARCANE_PORT}:3552"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_PATH}/arcane:/app/data
      - ${STACKS_PATH}:/opt/stacks
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - APP_URL=http://${SERVER_IP}:${ARCANE_PORT}
      - ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
    networks:
      - home

networks:
  home:
    external: true

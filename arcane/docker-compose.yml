services:

  # ===========================================================================
  # ARCANE - Modern, compose-native Docker management UI
  # http://${SERVER_IP}:${ARCANE_PORT}
  #
  # Default login on first run:  arcane / arcane-admin  — change it immediately.
  #
  # Manages the docker-compose.yml files in this repo directly. Arcane REQUIRES
  # its projects directory to be the SAME absolute path inside and outside the
  # container, so STACKS_PATH is bind-mounted to itself and PROJECTS_DIRECTORY
  # points at it. bootstrap.sh sets STACKS_PATH to wherever this repo lives, so
  # Arcane discovers every stack here even if it isn't /opt/docker/stacks.
  #
  # Deploy this first — every other stack is managed through it.
  # ===========================================================================
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - "${ARCANE_PORT}:3552"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_PATH}/arcane:/app/data
      - ${STACKS_PATH}:${STACKS_PATH}      # MUST be identical inside & out
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - APP_URL=http://${SERVER_IP}:${ARCANE_PORT}
      - PROJECTS_DIRECTORY=${STACKS_PATH}
      - ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
    labels:
      caddy: arcane.${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3552}}"
    networks:
      - home

networks:
  home:
    external: true

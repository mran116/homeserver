# CrowdSec log acquisition — what the engine reads to detect attacks.
# Mounted into the container at /etc/crowdsec/acquis.d/homestack.yaml.
#
# Caddy access logs (brute-force, scans, CVE probes against anything you
# reverse-proxy). Caddy writes JSON access logs under its data dir, mounted
# read-only at /var/log/caddy.
---
filenames:
  - /var/log/caddy/*.log
labels:
  type: caddy
---
# Host SSH auth (brute-force against the box itself). Mounted read-only.
# On distros without /var/log/auth.log (pure journald), use the journalctl
# source instead — see docs/crowdsec.md.
filenames:
  - /var/log/auth.log
labels:
  type: syslog

services:

  # ===========================================================================
  # NGINX PROXY MANAGER - Reverse proxy with SSL
  # http://${SERVER_IP}:${NPM_PORT}
  # Default login: admin@example.com / changeme
  # Change immediately after first login!
  # Provides:
  #   - SSL certificates for all services
  #   - Clean local URLs like jellyfin.home
  #   - Works alongside Cloudflare Tunnel
  # ===========================================================================
  npm-db:
    image: mariadb:lts
    container_name: npm-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${NPM_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=npm
      - MYSQL_USER=npm
      - MYSQL_PASSWORD=${NPM_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/npm/db:/var/lib/mysql
    networks:
      - home

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    depends_on:
      - npm-db
    ports:
      - "${NPM_PORT}:81"        # Admin UI
      - "80:80"                 # HTTP
      - "443:443"               # HTTPS
    volumes:
      - ${CONFIG_PATH}/npm/data:/data
      - ${CONFIG_PATH}/npm/letsencrypt:/etc/letsencrypt
    environment:
      - DB_MYSQL_HOST=npm-db
      - DB_MYSQL_PORT=3306
      - DB_MYSQL_USER=npm
      - DB_MYSQL_PASSWORD=${NPM_DB_PASSWORD}
      - DB_MYSQL_NAME=npm
      - TZ=${TZ}
    networks:
      - home

  # ===========================================================================
  # CADDY (caddy-docker-proxy) — config-as-code reverse proxy + automatic HTTPS.
  # OPT-IN alternative to Nginx Proxy Manager: only runs with COMPOSE_PROFILES=caddy.
  # NPM and Caddy both bind :80/:443 — run ONE. Routes GENERATE THEMSELVES from
  # container labels; a single wildcard cert (*.${DOMAIN}) via Cloudflare DNS-01
  # covers every service, internal + external, auto-renewing, zero per-host setup.
  # Add two labels to a service and its HTTPS route appears. Full guide + the
  # NPM→Caddy cutover: docs/caddy.md
  # ===========================================================================
  caddy:
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    environment:
      - CADDY_INGRESS_NETWORKS=home
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      # read-only docker socket — Caddy reads container labels to build routes.
      # Harden later by pointing at the dashboard stack's docker-socket-proxy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_PATH}/caddy/data:/data
      - ${CONFIG_PATH}/caddy/config:/config
    labels:
      # Global options (labels with no site address). One wildcard cert for all.
      caddy.email: ${ACME_EMAIL}
      caddy.acme_dns: "cloudflare {env.CLOUDFLARE_DNS_API_TOKEN}"
    networks:
      - home

  # ===========================================================================
  # ADGUARD HOME - Network-wide DNS ad/tracker blocking + local DNS
  # http://${SERVER_IP}:${ADGUARD_PORT}
  #
  # First run:
  #   1. Open the admin UI on ${ADGUARD_PORT} and run the setup wizard.
  #   2. Set the *admin interface* to port 3000 (matches the mapping below) and
  #      the *DNS server* to listen on 0.0.0.0:53.
  #   3. Point your router's DNS (or each device) at this server's IP for
  #      whole-home blocking. Add local rewrites (e.g. *.home -> server IP) for
  #      clean hostnames instead of IP:port.
  #
  # PORT 53 GOTCHA: if the host runs systemd-resolved, it already holds :53 and
  # AdGuard won't start. Free it first:
  #   sudo systemctl disable --now systemd-resolved
  # then replace /etc/resolv.conf with a static nameserver (e.g. 1.1.1.1).
  # ===========================================================================
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${ADGUARD_PORT}:3000/tcp"
    volumes:
      - ${CONFIG_PATH}/adguard/work:/opt/adguardhome/work
      - ${CONFIG_PATH}/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ}
    networks:
      - home

  # ===========================================================================
  # CROWDSEC - intrusion detection/prevention (engine). OPT-IN: COMPOSE_PROFILES=crowdsec.
  # Reads NPM access logs + host SSH auth, runs detection scenarios + a community
  # IP blocklist, and exposes a local API on 127.0.0.1:8080 for a bouncer to act on.
  # The ENFORCER (firewall bouncer) is a HOST package, not a container — after this
  # is up, run scripts/install-crowdsec-bouncer.sh to install + wire it (blocks in
  # the INPUT + DOCKER-USER chains). Engine alone = detection + console visibility;
  # the bouncer adds the actual blocking. Full guide: docs/crowdsec.md
  # ===========================================================================
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    profiles: ["crowdsec"]
    environment:
      - GID=${PGID:-1000}
      - TZ=${TZ}
      - COLLECTIONS=crowdsecurity/nginx crowdsecurity/sshd crowdsecurity/linux crowdsecurity/http-cve crowdsecurity/base-http-scenarios
      # Pre-register the host firewall bouncer with a known key (gen-secrets fills it).
      - BOUNCER_KEY_firewall=${CROWDSEC_BOUNCER_KEY}
      # Optional: enroll into app.crowdsec.net for a web dashboard + alerts.
      - ENROLL_KEY=${CROWDSEC_ENROLL_KEY:-}
      - ENROLL_INSTANCE_NAME=homestack
    ports:
      - "127.0.0.1:8080:8080"        # Local API — loopback only, for the host bouncer
    volumes:
      - ${CONFIG_PATH}/crowdsec/data:/var/lib/crowdsec/data        # decisions, bouncers, machines (SQLite)
      - ${CONFIG_PATH}/npm/data/logs:/var/log/npm:ro               # NPM access logs to scan
      - /var/log/auth.log:/var/log/auth.log:ro                     # host SSH auth (journald-only hosts: see docs)
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.d/homestack.yaml:ro
    networks:
      - home

  # ===========================================================================
  # BORGMATIC - Automated encrypted offsite backups
  # INACTIVE — enable with COMPOSE_PROFILES=backup in .env (after the steps below)
  # Backups are useless if they live on the same machine!
  # Setup:
  #   1. Create Backblaze B2 account at backblaze.com (free 10GB)
  #   2. Create a bucket and application key
  #   3. Fill in B2 credentials in borgmatic-config/config.yaml
  #   4. Fill in BORG_PASSPHRASE in .env
  #   5. Add "backup" to COMPOSE_PROFILES in .env
  # ===========================================================================
  borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:latest
    container_name: borgmatic
    restart: unless-stopped
    profiles: ["backup"]
    environment:
      - TZ=${TZ}
      - BORGMATIC_CRON=0 2 * * *
      - BORG_PASSPHRASE=${BORG_PASSPHRASE}
    volumes:
      - ${CONFIG_PATH}/borgmatic/config:/etc/borgmatic.d
      - ${CONFIG_PATH}/borgmatic/data:/root/.borgmatic
      - ${CONFIG_PATH}:/mnt/source/docker:ro
      - ${MEDIA_PATH}:/mnt/source/media:ro
      - /root/.ssh:/root/.ssh:ro
    networks:
      - home

  # ===========================================================================
  # TAILSCALE - Private VPN access to entire network
  # INACTIVE — enable with COMPOSE_PROFILES=vpn in .env
  # Get auth key: https://login.tailscale.com/admin/settings/keys
  # After deploy: approve the subnet route in the Tailscale admin panel.
  # Set TAILSCALE_SUBNET to your REAL LAN subnet. Full guide: docs/tailscale.md
  # ===========================================================================
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-infra
    hostname: ${TAILSCALE_HOSTNAME}
    restart: unless-stopped
    profiles: ["vpn"]
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ROUTES=${TAILSCALE_SUBNET}
      - TS_EXTRA_ARGS=--advertise-routes=${TAILSCALE_SUBNET}
    volumes:
      - ${CONFIG_PATH}/tailscale-infra:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - home

  # ===========================================================================
  # CLOUDFLARE TUNNEL - Secure public access, zero open ports
  # Defined below but INACTIVE by default — it only runs when COMPOSE_PROFILES=tunnel
  # is set in .env, so an install without a tunnel never starts it. No file edits.
  # Full design: docs/network-and-remote-access.md
  # Setup:
  #   1. Buy domain at cloudflare.com (~$10/year)
  #   2. Zero Trust → Networks → Tunnels → Create tunnel
  #   3. Put the token in CLOUDFLARE_TUNNEL_TOKEN in .env, and set COMPOSE_PROFILES=tunnel
  #   4. Add public-hostname routes in the Cloudflare dashboard (cloudflared is
  #      on the `home` network, so it reaches services by container name):
  #      requests.${DOMAIN}   → http://seerr:5055
  #      photos.${DOMAIN}     → http://immich-server:2283
  #      audiobooks.${DOMAIN} → http://audiobookshelf:80
  #      music.${DOMAIN}      → http://navidrome:4533
  #      vault.${DOMAIN}      → http://vaultwarden:80   (Access on /admin ONLY —
  #                             full-domain Access breaks the Bitwarden clients)
  #   NOTE: Jellyfin is served DIRECT (DNS-only A record + 443 → NPM), never
  #   through the tunnel — streaming video over Cloudflare violates their ToS.
  #   See the ddns-updater below for the dynamic-IP A record.
  # ===========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # Runs ONLY when COMPOSE_PROFILES=tunnel is set in .env (otherwise defined but
    # inactive — no crash on installs without a token). No commenting needed.
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TZ=${TZ}
    networks:
      - home

  # ===========================================================================
  # DDNS-UPDATER - keep the Jellyfin (direct) A record pointed at a dynamic WAN IP
  # INACTIVE — enable with COMPOSE_PROFILES=ddns in .env
  # Uses a scoped Cloudflare token (Zone → DNS → Edit). Sets PROXIED=false so the
  # record stays DNS-only (grey-cloud) — video must not traverse Cloudflare.
  # Then forward host 443 (+80 for the cert/redirect) on the Flint 3 → NPM.
  # ===========================================================================
  ddns-updater:
    image: favonia/cloudflare-ddns:latest
    container_name: ddns-updater
    restart: unless-stopped
    user: ${PUID}:${PGID}
    profiles: ["ddns"]
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
      - DOMAINS=${DDNS_DOMAINS}
      - PROXIED=false
      - TZ=${TZ}
    networks:
      - home

networks:
  home:
    external: true

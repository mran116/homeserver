services:

  # ===========================================================================
  # VAULTWARDEN - Password Manager
  # http://${SERVER_IP}:${VAULTWARDEN_PORT}
  # Standalone stack - critical service, isolated from everything else
  #
  # First login (do this ONCE):
  #   1. Set VAULTWARDEN_SIGNUPS_ALLOWED=true in .env and redeploy this stack
  #   2. Open http://${SERVER_IP}:${VAULTWARDEN_PORT} and create your account
  #   3. Set VAULTWARDEN_SIGNUPS_ALLOWED=false and redeploy (locks out new signups)
  #   4. Enable 2FA immediately; use /admin (ADMIN_TOKEN) for server settings
  #
  # Mobile/Desktop: Use official Bitwarden app
  #   Point server URL to http://${SERVER_IP}:${VAULTWARDEN_PORT}
  # ===========================================================================
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "${VAULTWARDEN_PORT}:80"
    volumes:
      - ${CONFIG_PATH}/vaultwarden:/data
    environment:
      - TZ=${TZ}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS_ALLOWED}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    networks:
      - home

networks:
  home:
    external: true

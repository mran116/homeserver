# wger reverse proxy — serves collected static/media, proxies the rest to the
# gunicorn app (container "wger" on :8000). Adapted from the official wger
# nginx.conf (upstream host web -> wger).
#
# Resolve the app's address at request time via Docker's embedded DNS (127.0.0.11)
# instead of a static `upstream` block. A static upstream is resolved ONCE at
# nginx startup, so when the `wger` container is recreated (new container IP after
# an image update / redeploy) nginx keeps proxying to the dead old IP and every
# request 502s until nginx is restarted. Using a variable in proxy_pass forces
# per-request re-resolution, so a recreated backend self-heals within `valid`.
resolver 127.0.0.11 valid=30s ipv6=off;

log_format json_access escape=json
    '{'
        '"ts":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"request_proto":"$server_protocol",'
        '"request_host":"$host",'
        '"status":$status,'
        '"size":$body_bytes_sent,'
        '"duration":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

map $http_x_forwarded_proto $final_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    access_log /dev/stdout json_access;

    location / {
        set $wger_upstream http://wger:8000;
        proxy_pass $wger_upstream$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $final_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /wger/static/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }

    location /media/ {
        alias /wger/media/;
    }

    client_max_body_size 100M;
}

# wger reverse proxy — serves collected static/media, proxies the rest to the
# gunicorn app (container "wger" on :8000). Adapted from the official wger
# nginx.conf; the only change is the upstream host (web -> wger).
upstream wger_app {
    server wger:8000;
}

log_format json_access escape=json
    '{'
        '"ts":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"request_proto":"$server_protocol",'
        '"request_host":"$host",'
        '"status":$status,'
        '"size":$body_bytes_sent,'
        '"duration":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

map $http_x_forwarded_proto $final_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    access_log /dev/stdout json_access;

    location / {
        proxy_pass http://wger_app;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $final_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /wger/static/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }

    location /media/ {
        alias /wger/media/;
    }

    client_max_body_size 100M;
}
